<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하이텔 대화방 - CHATTING</title>

<style>
  @import url("https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css");
  :root{
    --bg:#0000aa; --bg-dark:#00006b; --border:#55ffff;
    --txt:#c8c8d4; --bright:#ffffff; --cyan:#55ffff;
    --yellow:#ffff55; --green:#55ff55; --magenta:#ff55ff; --red:#ff5555;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#000; }
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:16px;
        font-family:"Galmuri11","DungGeunMo","D2Coding",monospace; }
  .monitor{ width:100%; max-width:880px; background:var(--bg); border:14px solid #2b2b2b;
    border-radius:14px; box-shadow:0 0 0 2px #000, 0 18px 50px rgba(0,0,0,.7);
    position:relative; overflow:hidden; }
  .monitor::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.18) 2px 3px);
    mix-blend-mode:multiply; }
  .screen{ padding:14px 16px; color:var(--txt); font-size:16px; line-height:1.55;
    letter-spacing:.5px; min-height:560px; position:relative; z-index:1; display:flex; flex-direction:column; }

  .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .logo{ background:var(--cyan); color:var(--bg); padding:0 8px; font-weight:bold; }
  .title{ flex:1; text-align:center; color:var(--bright); font-weight:bold; }
  .count{ color:var(--yellow); }
  hr.line{ border:0; border-top:1px solid var(--border); margin:6px 0; opacity:.7; width:100%; }

  .form{ display:flex; flex-direction:column; gap:10px; max-width:440px; margin:26px auto; }
  .form h2{ color:var(--cyan); text-align:center; margin:0 0 4px; }
  input{ background:var(--bg-dark); color:var(--bright); border:1px solid var(--border);
    font-family:inherit; font-size:15px; padding:8px 10px; letter-spacing:.5px; outline:none; }
  button{ font-family:inherit; font-size:15px; cursor:pointer; padding:8px 12px;
    background:var(--cyan); color:var(--bg); border:0; }
  button.ghost{ background:transparent; color:var(--cyan); border:1px solid var(--border); }
  .rowbtn{ display:flex; gap:8px; } .rowbtn button{ flex:1; }
  .muted{ color:#8888bb; font-size:13px; text-align:center; }
  .err{ color:var(--red); text-align:center; min-height:18px; }

  .body{ flex:1; display:flex; gap:12px; min-height:0; }
  .log{ flex:1; overflow-y:auto; padding-right:6px; white-space:pre-wrap; }
  .members{ width:150px; border-left:1px solid var(--border); padding-left:10px; overflow-y:auto; }
  .members h3{ color:var(--yellow); margin:0 0 6px; font-size:15px; }
  .members div{ cursor:pointer; }
  .members div:hover{ text-decoration:underline; }

  .sys{ color:var(--yellow); } .me-tag{ color:var(--cyan); }
  .nick{ font-weight:bold; } .time{ color:#7777aa; font-size:12px; }
  .whisper{ color:var(--magenta); }
  .codebox{ color:var(--bg); background:var(--yellow); padding:0 6px; font-weight:bold; }

  .inputbar{ display:flex; gap:8px; align-items:center; margin-top:6px; }
  .inputbar .pmt{ color:var(--cyan); } .inputbar input{ flex:1; }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:#3a3a8f; }
  @media (max-width:560px){ .screen{ font-size:13px; } .members{ width:110px; } }
</style>

<div class="monitor"><div class="screen" id="screen"></div></div>

<script>
const $  = (s)=>document.querySelector(s);
const esc=(s)=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const hhmm=(t)=>{ const d=new Date(t); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const PALETTE=["#55ffff","#55ff55","#ffff55","#ff55ff","#ff5555","#ffffff","#88aaff"];
const colorOf=(n)=>{ let h=0; for(const c of n) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h%PALETTE.length]; };

let me="", room="", ws=null, wsReady=false, queue=[];
// 페이지를 띄운 바로 그 주소로 자동 연결 → 배포하면 링크만으로 동작
function autoWsUrl(){
  if(location.protocol==="http:"||location.protocol==="https:")
    return (location.protocol==="https:"?"wss://":"ws://")+location.host;
  return "ws://localhost:8080"; // 파일을 직접 열었을 때만
}
let serverUrl=autoWsUrl();

function connect(url){
  serverUrl=url;
  ws=new WebSocket(url);
  ws.onopen   =()=>{ wsReady=true; queue.forEach(x=>ws.send(x)); queue=[]; };
  ws.onmessage=(e)=>{ try{ handle(JSON.parse(e.data)); }catch{} };
  ws.onerror  =()=>{ const el=$("#err"); if(el) el.textContent="서버에 연결 못함 — server.js 가 켜져 있나요?"; };
  ws.onclose  =()=>{ wsReady=false; };
}
function sendS(obj){ const s=JSON.stringify(obj); if(wsReady) ws.send(s); else queue.push(s); }

/* ── 들어온 메시지 처리 ── */
function handle(d){
  if(d.kind==="auth-ok"){ me=d.username; renderRoom(); }
  else if(d.kind==="auth-err"){ const el=$("#err"); if(el) el.textContent=d.text; }
  else if(d.kind==="join-err"){ const el=$("#err"); if(el) el.textContent=d.text; }
  else if(d.kind==="joined"){ room=d.code; renderChat(); }
  else if(d.kind==="history"){ d.list.forEach(x=>addMsg(x.nick,x.text,x.nick===me,x.time)); }
  else if(d.kind==="roster"){ drawMembers(d.list); }
  else if(d.kind==="system"){ addSystem(d.text); }
  else if(d.kind==="msg"){ if(d.nick!==me) addMsg(d.nick,d.text,false,d.time); }
  else if(d.kind==="whisper"){ addWhisper(d.from,d.to,d.text,d.mine); }
  else if(d.kind==="whisper-err"){ addSystem(d.text); }
}

/* ── 1. 로그인 / 회원가입 ── */
function renderAuth(){
  $("#screen").innerHTML=`
    <div class="topbar"><span class="logo">hitel</span>
      <span class="title">대 화 방  CHATTING</span></div>
    <hr class="line">
    <div class="form">
      <h2>＊ 회원 접속 ＊</h2>
      <input id="user" placeholder="아이디" maxlength="16" autocomplete="off">
      <input id="pw" type="password" placeholder="비밀번호" maxlength="32">
      <div class="rowbtn">
        <button id="login">로그인</button>
        <button class="ghost" id="signup">회원가입</button>
      </div>
      <div class="err" id="err"></div>
      <hr class="line">
      <input id="srv" value="${autoWsUrl()}">
      <div class="muted">서버 주소는 자동으로 잡힙니다. (직접 켤 땐 node server.js)</div>
    </div>`;
  $("#user").focus();
  const go=(action)=>{
    $("#err").textContent="";
    const u=$("#user").value.trim(), p=$("#pw").value;
    if(!u||!p){ $("#err").textContent="아이디와 비밀번호를 입력하세요."; return; }
    if(!ws) connect($("#srv").value.trim());
    sendS({action, username:u, password:p});
  };
  $("#login").onclick =()=>go("login");
  $("#signup").onclick=()=>go("signup");
  $("#pw").addEventListener("keydown",e=>{ if(e.key==="Enter") go("login"); });
}

/* ── 2. 방 코드 입력 ── */
function renderRoom(){
  $("#screen").innerHTML=`
    <div class="topbar"><span class="logo">hitel</span>
      <span class="title">대화방 선택</span>
      <span class="count">${esc(me)} 님</span></div>
    <hr class="line">
    <div class="form">
      <h2>＊ 방 코드 4자리 ＊</h2>
      <input id="code" placeholder="예: 1004" maxlength="4" inputmode="numeric"
             style="text-align:center; font-size:26px; letter-spacing:10px;">
      <button id="enter">입장 / 새 방 만들기</button>
      <div class="err" id="err"></div>
      <div class="muted">같은 코드를 아는 사람끼리만 모입니다. 없는 코드면 새로 만들어져요.</div>
    </div>`;
  $("#code").focus();
  const enter=()=>{
    $("#err").textContent="";
    const c=$("#code").value.trim();
    if(!/^\d{4}$/.test(c)){ $("#err").textContent="숫자 4자리로 입력하세요."; return; }
    sendS({action:"join", code:c});
  };
  $("#enter").onclick=enter;
  $("#code").addEventListener("keydown",e=>{ if(e.key==="Enter") enter(); });
}

/* ── 3. 채팅방 ── */
function renderChat(){
  $("#screen").innerHTML=`
    <div class="topbar"><span class="logo">hitel</span>
      <span class="title">큰마을 수다방 <span class="codebox">${esc(room)}</span></span>
      <span class="count" id="hdr-count">참가자 0</span></div>
    <hr class="line">
    <div class="body">
      <div class="log" id="log"></div>
      <div class="members"><h3>참가자</h3><div id="mlist"></div></div>
    </div>
    <hr class="line">
    <div class="inputbar"><span class="pmt">${esc(me)} &gt;&gt;</span>
      <input id="say" placeholder="대화 입력 · 귓속말은  /귓 닉네임 내용" autocomplete="off"></div>`;
  $("#say").focus();
  $("#say").addEventListener("keydown",e=>{
    if(e.key!=="Enter") return;
    const v=e.target.value.trim(); if(!v) return;
    e.target.value="";
    const w=v.match(/^\/(?:귓|w)\s+(\S+)\s+([\s\S]+)$/);  // /귓 닉 내용
    if(w){ sendS({action:"whisper", to:w[1], text:w[2]}); }
    else { sendS({action:"say", text:v}); }
  });
  addSystem(`'${room}' 번 방에 입장했습니다. 코드를 아는 사람과 공유하세요.`);
}

/* ── 로그 그리기 ── */
function addLine(html){ const l=$("#log"); if(!l) return; l.insertAdjacentHTML("beforeend",html); l.scrollTop=l.scrollHeight; }
function addSystem(t){ addLine(`<div class="sys">─ ${esc(t)}</div>`); }
function addMsg(nick,text,mine,time){
  const c=colorOf(nick), tag=mine?`<span class="me-tag">[나] </span>`:"";
  addLine(`<div><span class="time">${hhmm(time||Date.now())} </span>${tag}<span class="nick" style="color:${c}">${esc(nick)}</span> : ${esc(text)}</div>`);
}
function addWhisper(from,to,text,mine){
  const label = mine ? `${esc(to)} 님에게 귓속말` : `${esc(from)} 님의 귓속말`;
  addLine(`<div class="whisper">((${label})) ${esc(text)}</div>`);
}
function drawMembers(list){
  $("#mlist").innerHTML = list.map(n=>`<div style="color:${colorOf(n)}" data-n="${esc(n)}">● ${esc(n)}</div>`).join("");
  $("#hdr-count").textContent=`참가자 ${list.length}`;
  document.querySelectorAll("#mlist div").forEach(el=>{
    el.onclick=()=>{ const s=$("#say"); s.value=`/귓 ${el.dataset.n} `; s.focus(); };
  });
}

renderAuth();
</script>
